spring:
  application:
    name: settlement-batch

  datasource:
    url: jdbc:mysql://localhost:3306/settlement?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: settlement
    password: settlement
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # validate: 엔티티와 실제 스키마가 어긋나면 기동 단계에서 막는 운영 안전값.
      # 스키마를 아직 만들기 전 초기 개발이라면 update 로 바꿔 자동 생성하게 한다.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  batch:
    jdbc:
      # Spring Batch 메타테이블(BATCH_JOB_*, BATCH_STEP_*)이 없으면 잡 실행 자체가 실패한다.
      # always: 없으면 생성하고 있으면 건너뛴다(스크립트가 IF NOT EXISTS 형태).
      initialize-schema: always
    job:
      # 컨텍스트 기동과 동시에 잡이 도는 것을 막는다. 어떤 잡을 언제 돌릴지 명시적으로 제어.
      enabled: false