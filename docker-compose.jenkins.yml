services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped
    ports:
      # host:container — 웹 UI를 9000으로 노출(컨테이너 내부는 8080 고정).
      - "9000:8080"
      # 에이전트(빌드 노드) 통신용 포트.
      - "50000:50000"
    environment:
      TZ: Asia/Seoul
    volumes:
      # 설정·잡·플러그인을 named volume에 보관 → 컨테이너를 지워도 유지된다.
      - jenkins_home:/var/jenkins_home
      # (선택) Jenkins가 호스트 Docker로 이미지까지 빌드하게 하려면 주석 해제:
      # - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_home:
